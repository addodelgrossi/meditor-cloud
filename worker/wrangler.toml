name = "meditor-share"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Create with `wrangler kv namespace create SHARES` and paste the id here.
# See ../README.md "Provisioning from scratch".
kv_namespaces = [
  { binding = "SHARES", id = "0a66e5153712471a874cd8a39b21f25d" }
]

# Custom-domain routes for meditor.dev. The worker also stays reachable at
# meditor-share.<account>.workers.dev.
routes = [
  { pattern = "meditor.dev/api/*", zone_name = "meditor.dev" },
  { pattern = "meditor.dev/s/*",   zone_name = "meditor.dev" },
]
