name: Terraform

on:
  pull_request:
    paths: ["infra/**", ".github/workflows/terraform.yml"]
  workflow_dispatch: {} # manual apply, gated by the environment's required reviewers

defaults:
  run:
    working-directory: infra

env:
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN_TF }}
  TF_VAR_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -input=false

  apply:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Create a GitHub Environment named "production" with required reviewers so
    # apply only runs after a human approves.
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
      - run: terraform apply -input=false -auto-approve
