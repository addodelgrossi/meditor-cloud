name: Deploy Worker

on:
  push:
    branches: [main]
    paths: ["worker/**", ".github/workflows/deploy.yml"]
  pull_request:
    paths: ["worker/**", ".github/workflows/deploy.yml"]

defaults:
  run:
    working-directory: worker

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  deploy:
    # Only deploy from main; PRs run tests only.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      # Stay green until Cloudflare is configured: skip the deploy steps when the
      # API token secret is absent instead of failing every push to main.
      - id: guard
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping Worker deploy."
          fi
      - if: steps.guard.outputs.configured == 'true'
        uses: actions/checkout@v4
      - if: steps.guard.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - if: steps.guard.outputs.configured == 'true'
        run: npm ci
      - if: steps.guard.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
